<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Event Gate Scanner</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6fb;
      color: #111827;
    }
    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 22px;
      padding: 20px;
      box-shadow: 0 12px 30px rgba(0,0,0,.08);
      margin-top: 20px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 30px;
    }
    .sub {
      color: #6b7280;
      margin-bottom: 18px;
    }
    #reader {
      width: 100%;
      min-height: 320px;
      border-radius: 18px;
      overflow: hidden;
      background: #000;
    }
    input, button {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      font-size: 16px;
      margin-top: 12px;
      box-sizing: border-box;
    }
    input {
      border: 1px solid #d1d5db;
    }
    button {
      border: 0;
      font-weight: 700;
      cursor: pointer;
      background: #111827;
      color: white;
    }
    .secondary {
      background: #e5e7eb;
      color: #111827;
    }
    .panel {
      margin-top: 18px;
      padding: 24px;
      border-radius: 18px;
      text-align: center;
      background: #f9fafb;
      border: 2px solid #e5e7eb;
    }
    .success { background: #ecfdf5; border-color: #86efac; }
    .duplicate { background: #fff7ed; border-color: #fdba74; }
    .error { background: #fef2f2; border-color: #fca5a5; }
    .title {
      font-size: 36px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    .name {
      font-size: 30px;
      font-weight: 800;
      margin: 8px 0 4px;
    }
    .post {
      color: #6b7280;
      font-size: 18px;
      margin-bottom: 10px;
    }
    .msg {
      font-size: 18px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Gate Scanner</h1>
      <div class="sub">Fast scan mode. Stays on this page after every check-in.</div>

      <input id="endpoint" placeholder="Apps Script Web App URL" />
      <input id="eventKey" placeholder="Event key (optional)" />
      <input id="checker" placeholder="Security name" value="Gate Security" />

      <div id="reader"></div>

      <button onclick="startScanner()">Start Camera</button>
      <button class="secondary" onclick="stopScanner()">Stop Camera</button>

      <input id="manualToken" placeholder="Manual token fallback" />
      <button class="secondary" onclick="manualCheckIn()">Manual Check-in</button>

      <div id="panel" class="panel">
        <div id="title" class="title">Ready</div>
        <div id="name" class="name" style="display:none;"></div>
        <div id="post" class="post" style="display:none;"></div>
        <div id="msg" class="msg">Tap Start Camera and point at a QR code.</div>
      </div>
    </div>
  </div>

  <script>
    let scanner = null;
    let running = false;
    let busy = false;
    let lastScan = '';
    let lastScanAt = 0;
    let jsonpCounter = 0;

    function setPanel(type, title, msg, attendee) {
      const panel = document.getElementById('panel');
      panel.className = 'panel';
      if (type === 'success') panel.classList.add('success');
      else if (type === 'duplicate') panel.classList.add('duplicate');
      else if (type === 'error' || type === 'invalid') panel.classList.add('error');

      document.getElementById('title').textContent = title || 'Ready';
      document.getElementById('msg').textContent = msg || '';

      const nameEl = document.getElementById('name');
      const postEl = document.getElementById('post');

      if (attendee && attendee.name) {
        nameEl.style.display = '';
        postEl.style.display = '';
        nameEl.textContent = attendee.name;
        postEl.textContent = attendee.post || '';
      } else {
        nameEl.style.display = 'none';
        postEl.style.display = 'none';
        nameEl.textContent = '';
        postEl.textContent = '';
      }
    }

    function extractToken(scannedText) {
      try {
        if (scannedText.startsWith('http://') || scannedText.startsWith('https://')) {
          const url = new URL(scannedText);
          return url.searchParams.get('token') || '';
        }
      } catch (e) {}
      return scannedText.trim();
    }

    function callAppsScriptJsonp(token) {
      return new Promise((resolve, reject) => {
        const endpoint = document.getElementById('endpoint').value.trim();
        const checker = document.getElementById('checker').value.trim() || 'Gate Security';
        const key = document.getElementById('eventKey').value.trim();

        if (!endpoint) {
          reject(new Error('Paste your Apps Script Web App URL first.'));
          return;
        }

        const cbName = 'scannerCallback_' + (++jsonpCounter);

        window[cbName] = function(data) {
          cleanup();
          resolve(data);
        };

        function cleanup() {
          try { delete window[cbName]; } catch (e) { window[cbName] = undefined; }
          if (script.parentNode) script.parentNode.removeChild(script);
          clearTimeout(timer);
        }

        const url = new URL(endpoint);
        url.searchParams.set('action', 'apiCheckin');
        url.searchParams.set('token', token);
        url.searchParams.set('checker', checker);
        url.searchParams.set('key', key);
        url.searchParams.set('callback', cbName);
        url.searchParams.set('_ts', Date.now());

        const script = document.createElement('script');
        script.src = url.toString();

        script.onerror = function() {
          cleanup();
          reject(new Error('Could not reach Apps Script.'));
        };

        const timer = setTimeout(() => {
          cleanup();
          reject(new Error('Apps Script timed out.'));
        }, 8000);

        document.body.appendChild(script);
      });
    }

    async function handleScan(decodedText) {
      const now = Date.now();
      if (busy) return;
      if (decodedText === lastScan && now - lastScanAt < 2500) return;

      lastScan = decodedText;
      lastScanAt = now;

      const token = extractToken(decodedText);
      if (!token) {
        setPanel('error', 'Invalid QR', 'Could not read a token from this QR.');
        return;
      }

      busy = true;
      setPanel('', 'Checking In...', 'Please wait...');

      try {
        const result = await callAppsScriptJsonp(token);
        setPanel(result.status, result.title, result.message, result.attendee);
      } catch (err) {
        setPanel('error', 'Network Error', err.message || 'Could not update the sheet.');
      } finally {
        setTimeout(() => {
          busy = false;
          setPanel('', 'Ready', 'Point camera at the next badge.', null);
        }, 900);
      }
    }

    async function startScanner() {
      if (running) return;

      try {
        scanner = new Html5Qrcode('reader');
        await scanner.start(
          { facingMode: 'environment' },
          { fps: 10, qrbox: { width: 240, height: 240 } },
          async (decodedText) => {
            await handleScan(decodedText);
          }
        );

        running = true;
        setPanel('', 'Scanner Live', 'Point camera at badge QR.', null);
      } catch (err) {
        setPanel('error', 'Camera Error', err.message || 'Camera permission failed.');
      }
    }

    async function stopScanner() {
      try {
        if (scanner && running) {
          await scanner.stop();
          await scanner.clear();
        }
      } catch (e) {}
      scanner = null;
      running = false;
      busy = false;
      setPanel('', 'Stopped', 'Camera stopped.', null);
    }

    async function manualCheckIn() {
      const token = document.getElementById('manualToken').value.trim();
      if (!token) {
        setPanel('error', 'Missing Token', 'Enter a token first.');
        return;
      }

      busy = true;
      setPanel('', 'Checking In...', 'Please wait...');

      try {
        const result = await callAppsScriptJsonp(token);
        setPanel(result.status, result.title, result.message, result.attendee);
        document.getElementById('manualToken').value = '';
      } catch (err) {
        setPanel('error', 'Network Error', err.message || 'Could not update the sheet.');
      } finally {
        setTimeout(() => {
          busy = false;
          setPanel('', 'Ready', 'Point camera at the next badge.', null);
        }, 900);
      }
    }
  </script>
</body>
</html>
